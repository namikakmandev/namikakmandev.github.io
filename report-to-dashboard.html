<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Report → Dashboard — Namık Akman</title>
  <meta name="description" content="Photograph a one-page report and turn it into a live dashboard — KPIs, charts and AI-written insights. OCR runs in your browser; only the extracted text is sent for structuring." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="theme-color" content="#2F9BFF" />
  <link rel="stylesheet" href="css/style.css?v=30" />
  <style>
    /* ---- input stage ---- */
    .rd-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
    @media (max-width: 860px) { .rd-inputs { grid-template-columns: 1fr; } }
    .rd-in {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px; text-align: center;
      cursor: pointer; transition: border-color .15s, transform .15s;
    }
    .rd-in:hover { border-color: var(--accent); transform: translateY(-2px); }
    .rd-in .big { font-size: 2rem; display: block; margin-bottom: 10px; }
    .rd-in h3 { font-size: 1.02rem; margin-bottom: 6px; }
    .rd-in p { color: var(--text-dim); font-size: 0.88rem; }
    .rd-note { margin-top: 18px; font-size: 0.82rem; color: var(--text-dim); }

    /* paste panel */
    #pastePanel { margin-top: 18px; display: none; }
    #pastePanel textarea {
      width: 100%; min-height: 180px; resize: vertical; padding: 12px;
      font: inherit; font-size: 0.9rem; color: var(--text);
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    }
    #pastePanel .row { display: flex; gap: 10px; margin-top: 10px; }

    /* ---- progress ---- */
    #progress { display: none; margin-top: 26px; }
    .steps-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .stepchip {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 999px; padding: 8px 16px; font-size: 0.88rem; color: var(--text-dim);
    }
    .stepchip.on { border-color: var(--accent); color: var(--text); }
    .stepchip.done { border-color: var(--accent-2); color: var(--text); }
    .stepchip .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--border); }
    .stepchip.on .dot { background: var(--accent); animation: rdpulse 1s infinite; }
    .stepchip.done .dot { background: var(--accent-2); }
    @keyframes rdpulse { 50% { opacity: 0.35; } }
    #progMsg { margin-top: 10px; font-size: 0.85rem; color: var(--text-dim); }
    #errBox {
      display: none; margin-top: 14px; padding: 14px 16px; border-radius: 10px;
      border: 1px solid var(--loss); background: rgba(229,72,77,0.1);
      color: var(--text); font-size: 0.9rem;
    }

    /* ---- dashboard ---- */
    #dash { display: none; }
    .dash-head { display: flex; flex-wrap: wrap; align-items: flex-end; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
    .dash-head h2 { font-size: 1.5rem; letter-spacing: -0.01em; }
    .dash-head .per { color: var(--text-dim); font-size: 0.92rem; }
    .dash-actions { display: flex; gap: 8px; }
    .dash-actions button {
      font: inherit; font-size: 0.84rem; font-weight: 600; cursor: pointer;
      padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
    }
    .dash-actions button:hover { border-color: var(--accent); }

    .rd-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 22px; }
    .rd-kpi {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 18px;
    }
    .rd-kpi .l { font-size: 0.76rem; color: var(--text-dim); letter-spacing: 0.03em; }
    .rd-kpi .v { font-size: 1.65rem; font-weight: 650; margin-top: 4px; }
    .rd-kpi .d { font-size: 0.82rem; font-weight: 600; margin-top: 3px; }
    .rd-kpi .d.up-good, .rd-kpi .d.down-good { color: var(--accent-2); }
    .rd-kpi .d.up-bad, .rd-kpi .d.down-bad { color: var(--loss); }
    .rd-kpi .d.flat { color: var(--text-dim); }

    .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 380px), 1fr)); gap: 18px; }
    .chart-card {
      position: relative; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 18px 12px;
    }
    .chart-card h3 { font-size: 0.95rem; margin-bottom: 2px; }
    .chart-card .unit { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 10px; }
    .chart-card svg { width: 100%; height: auto; display: block; }
    .legend { display: flex; flex-wrap: wrap; gap: 6px 16px; margin-top: 8px; }
    .legend span { display: inline-flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--text-dim); }
    .legend i { display: inline-block; border-radius: 2px; }
    .legend i.rect { width: 10px; height: 10px; }
    .legend i.line { width: 14px; height: 3px; border-radius: 2px; }

    .rd-tip {
      position: absolute; pointer-events: none; z-index: 5; display: none;
      background: #1b2230; border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 11px; font-size: 0.8rem; color: var(--text);
      box-shadow: 0 6px 18px rgba(0,0,0,0.35); max-width: 240px;
    }
    .rd-tip .t { color: var(--text-dim); font-size: 0.72rem; margin-bottom: 3px; }
    .rd-tip .r { display: flex; align-items: center; gap: 7px; }
    .rd-tip .r i { width: 12px; height: 3px; border-radius: 2px; display: inline-block; }
    .rd-tip .r b { font-weight: 650; }
    .rd-tip .r span { color: var(--text-dim); }

    .rd-insights {
      margin-top: 20px; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 22px;
    }
    .rd-insights h3 { font-size: 0.95rem; margin-bottom: 10px; }
    .rd-insights ul { list-style: none; }
    .rd-insights li {
      position: relative; padding: 6px 0 6px 22px; color: var(--text-dim); font-size: 0.92rem;
    }
    .rd-insights li::before {
      content: ""; position: absolute; left: 4px; top: 14px;
      width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    }
    .dash-src { margin-top: 14px; font-size: 0.78rem; color: var(--text-dim); }

    /* edit-data drawer */
    #editWrap { display: none; margin-top: 16px; }
    #editWrap textarea {
      width: 100%; min-height: 220px; resize: vertical; padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.8rem;
      color: var(--text); background: #1b2230; border: 1px solid var(--border); border-radius: 10px;
    }

    /* language toggle */
    .lang-toggle { display: inline-flex; gap: 0; margin-left: 14px; vertical-align: middle;
      border: 1px solid var(--border); border-radius: 999px; overflow: hidden; }
    .lang-toggle button {
      font: inherit; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em;
      padding: 4px 12px; border: 0; cursor: pointer;
      background: transparent; color: var(--text-dim);
    }
    .lang-toggle button.on { background: var(--accent); color: #fff; }

    /* restore-last-dashboard bar */
    #restoreBar {
      display: none; margin-top: 18px; padding: 12px 16px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      font-size: 0.9rem; color: var(--text-dim);
    }
    #restoreBar button { font: inherit; cursor: pointer; border: 0; background: none;
      color: var(--accent); font-weight: 600; padding: 0 4px; }

    /* charts & KPIs draw in one by one */
    @keyframes rdrise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
    .rd-kpi, .chart-card, .rd-insights { animation: rdrise 0.45s ease both; }
    @media (prefers-reduced-motion: reduce) { .rd-kpi, .chart-card, .rd-insights { animation: none; } }

    /* print-only branding */
    .print-brand, .print-foot { display: none; }

    /* print = light one-pager */
    @media print {
      body { background: #fff; }
      .site-header, .site-footer, .rd-intro, #inputStage, #progress,
      .dash-actions, #editWrap, .cta-band-wrap, #restoreBar { display: none !important; }
      #dash { display: block !important; }
      .rd-kpi, .chart-card, .rd-insights { animation: none !important; }
      /* direct value labels are light-on-dark on screen — darken for paper */
      svg text[fill="#e6e8ee"] { fill: #1f2430 !important; }
      .print-brand {
        display: flex; justify-content: space-between; align-items: baseline;
        border-bottom: 3px solid #2F9BFF; padding-bottom: 10px; margin-bottom: 18px;
        font-size: 0.85rem; color: #5b6472;
      }
      .print-brand b { font-size: 1.05rem; color: #1f2430; }
      .print-brand b span { color: #2F9BFF; }
      .print-foot {
        margin-top: 18px; border-top: 1px solid #d6dce4; padding-top: 10px;
        display: flex; justify-content: space-between;
        font-size: 0.75rem; color: #5b6472;
      }
      :root {
        --bg: #ffffff; --surface: #ffffff; --surface-2: #f2f4f8;
        --text: #1f2430; --text-dim: #5b6472; --border: #d6dce4;
      }
      .chart-card, .rd-kpi, .rd-insights { break-inside: avoid; box-shadow: none; }
      .rd-tip { display: none !important; }
      @page { size: A4; margin: 12mm; }
    }
  </style>
</head>

    function renderBar(card, c, tip) {

          ? "\n\nTHE REPORT PAGE IS ATTACHED AS AN IMAGE. Read every number and label directly from the image."
          : "\n\nOCR TEXT OF THE REPORT PAGE:\n\n" + String(opts.text || "").slice(0, 9000)) +
        "\n\nConvert this to the dashboard JSON now. Reply with only the compact single-line JSON object — no other words." +

      if (opts.image) body.image = opts.image;

        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(body)

    /* Tolerant JSON extraction: strips fences/commentary, finds the first

       (the proxy caps response length) by closing whatever is still open. */
    function tryParse(s) { try { return JSON.parse(s); } catch (e) { return null; } }
    function scanOpen(s) {
      var stack = [], inStr = false, esc = false;
      for (var i = 0; i < s.length; i++) {
        var ch = s[i];
        if (inStr) {
          if (esc) esc = false;
          else if (ch === "\\") esc = true;
          else if (ch === '"') inStr = false;
        } else if (ch === '"') inStr = true;
        else if (ch === "{" || ch === "[") stack.push(ch);
        else if (ch === "}" || ch === "]") stack.pop();

      return { stack: stack, inStr: inStr };
    }
    function parseAI(text) {
      text = String(text).replace(/```[a-z]*/gi, "");
      var a = text.indexOf("{");
      if (a < 0) throw new Error("The AI reply contained no JSON.");
      var s = text.slice(a);

      var depth = 0, inStr = false, esc = false, end = -1;
      for (var i = 0; i < s.length; i++) {
        var ch = s[i];
        if (inStr) {
          if (esc) esc = false;
          else if (ch === "\\") esc = true;
          else if (ch === '"') inStr = false;
          continue;
        }
        if (ch === '"') inStr = true;
        else if (ch === "{" || ch === "[") depth++;
        else if (ch === "}" || ch === "]") { depth--; if (depth === 0) { end = i; break; } }
      }
      if (end >= 0) {
        var d = tryParse(s.slice(0, end + 1));
        if (d) return d;
      }
      // truncated / dirty — cut back from the end and close what's open
      for (var cut = s.length; cut > 20; cut--) {
        if (!/[\d"\}\]el]/.test(s[cut - 1])) continue; // plausible value endings only
        var head = s.slice(0, cut);
        var open = scanOpen(head);
        if (open.inStr) continue;
        var closers = open.stack.slice().reverse().map(function (c) { return c === "{" ? "}" : "]"; }).join("");
        var fixed = tryParse(head.replace(/[,\s]+$/, "") + closers);
        if (fixed) return fixed;
      }
      throw new Error("The AI reply was not valid JSON.");
    }

    /* Ask → parse; on a dirty reply, retry once with a smaller-output request. */
    function askAndRender(opts, srcNote) {
      function finish(data) {
        setStep(2, "done");
        setStep(3, "on", T("msgRender"));
        setStep(3, "done", "");
        $("progress").style.display = "none";
        renderDash(data, srcNote);
      }
      return askAI(opts).then(function (j) {
        try { finish(parseAI(j.text)); }
        catch (e) {
          console.error("Report→Dashboard: unparseable AI reply, retrying once.", j.text);
          setStep(2, "on", T("msgRetry"));
          return askAI(opts,
            "IMPORTANT: your previous reply was cut off or not valid JSON. Reply again with ONLY complete, compact, single-line JSON. Limit yourself to at most 4 kpis, 2 charts and 2 insights so the reply stays short.")
            .then(function (j2) {
              try { finish(parseAI(j2.text)); }
              catch (e2) {
                fail("(v4) " + T("errNoJSON") + "“" + String(j2.text).slice(0, 220) + "”");
              }
            });
        }
      });
    }

    function runFromText(text, srcNote) {
      if (!text || text.replace(/\s/g, "").length < 30) { fail(T("errNoText")); return; }
      askAndRender({ text: text }, srcNote)
        .catch(function (e) { fail("(v4) " + (e.message || "Something went wrong.")); });
    }

    var tessReady = null;
    function loadTesseract() {
      if (tessReady) return tessReady;
      tessReady = new Promise(function (res, rej) {
        var s = document.createElement("script");
        s.src = "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
        s.onload = function () { res(window.Tesseract); };
        s.onerror = function () { rej(new Error("Could not load the OCR library.")); };
        document.head.appendChild(s);
      });
      return tessReady;
    }

    /* Downscale to ≤1800px long edge, re-encode as JPEG data URL for the vision path. */
    function fileToDataURL(file) {
      return new Promise(function (res, rej) {
        var url = URL.createObjectURL(file);
        var img = new Image();
        img.onload = function () {
          try {
            var max = 1800, w = img.naturalWidth, h = img.naturalHeight;
            var k = Math.min(1, max / Math.max(w, h));
            var cv = document.createElement("canvas");
            cv.width = Math.round(w * k); cv.height = Math.round(h * k);
            cv.getContext("2d").drawImage(img, 0, 0, cv.width, cv.height);
            URL.revokeObjectURL(url);
            res(cv.toDataURL("image/jpeg", 0.85));
          } catch (e) { rej(e); }
        };
        img.onerror = function () { URL.revokeObjectURL(url); rej(new Error("Could not read the image.")); };
        img.src = url;
      });
    }

    function runOcrPath(file) {
      setStep(1, "on", T("msgOcrLoad"));
      loadTesseract().then(function (Tess) {
        return Tess.recognize(file, "eng+tur", {
          logger: function (m) {
            if (m.status === "recognizing text") {
              setStep(1, "on", T("msgOcr").replace("{p}", Math.round(m.progress * 100)));
            }
          }
        });
      }).then(function (out) {
        setStep(1, "done");
        runFromText(out.data.text, T("srcOcr"));
      }).catch(function (e) { fail(e.message || "OCR failed."); });
    }

    /* Photo pipeline: try the AI's vision first (much more accurate on tables
       and Turkish number formats). The upgraded worker replies with vision:true;
       if the worker doesn't support images yet, fall back to local OCR. */
    function runFromPhoto(file) {
      resetSteps(false);
      setStep(1, "on", T("msgPrep"));
      fileToDataURL(file).then(function (dataURL) {
        setStep(1, "done");
        return askAI({ image: dataURL }).then(function (j) {
          if (!j.vision) throw { fallback: true }; // old worker — it never saw the image
          // vision reply in hand: parse (with the standard one-retry salvage)
          function finish(data) {
            setStep(2, "done"); setStep(3, "on", T("msgRender")); setStep(3, "done", "");
            $("progress").style.display = "none";
            renderDash(data, T("srcVision"));
          }
          try { finish(parseAI(j.text)); }
          catch (e) {
            setStep(2, "on", T("msgRetry"));
            return askAI({ image: dataURL },
              "IMPORTANT: your previous reply was cut off or not valid JSON. Reply again with ONLY complete, compact, single-line JSON. Limit yourself to at most 4 kpis, 2 charts and 2 insights so the reply stays short.")
              .then(function (j2) { finish(parseAI(j2.text)); });
          }
        });
      }).catch(function (e) {
        if (e && e.fallback) { console.info("Report→Dashboard: worker has no vision support — using local OCR."); }
        else { console.warn("Report→Dashboard: vision path failed — using local OCR.", e); }
        resetSteps(false);
        runOcrPath(file);
      });
    }

    /* ---------- wiring ---------- */
    $("btnPhoto").addEventListener("click", function () { $("fileInput").click(); });
    $("btnPhoto").addEventListener("keydown", function (e) { if (e.key === "Enter") $("fileInput").click(); });
    $("fileInput").addEventListener("change", function () {
      if (this.files && this.files[0]) runFromPhoto(this.files[0]);
      this.value = "";
    });
    $("btnPaste").addEventListener("click", function () {
      $("pastePanel").style.display = "block";
      $("pasteBox").focus();
    });
    $("btnPasteCancel").addEventListener("click", function () { $("pastePanel").style.display = "none"; });
    $("btnPasteGo").addEventListener("click", function () {
      resetSteps(true);
      runFromText($("pasteBox").value, T("srcPaste"));
    });
    $("btnDemo").addEventListener("click", function () {
      $("progress").style.display = "none"; $("errBox").style.display = "none";
      renderDash(JSON.parse(JSON.stringify(SAMPLE)), T("srcSample"));
    });
    $("btnPrint").addEventListener("click", function () { window.print(); });
    $("btnEdit").addEventListener("click", function () {
      var w = $("editWrap");
      w.style.display = w.style.display === "block" ? "none" : "block";
    });
    $("btnRerender").addEventListener("click", function () {
      try { renderDash(JSON.parse($("editBox").value), $("dSrc").textContent); }
      catch (e) { alert(T("editErr") + e.message); }
    });
    $("btnReset").addEventListener("click", function () {
      $("dash").style.display = "none"; $("editWrap").style.display = "none";
      $("pastePanel").style.display = "none";
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    /* language */
    $("langEN").addEventListener("click", function () { setLang("en"); });
    $("langTR").addEventListener("click", function () { setLang("tr"); });
    applyLang();

    /* offer to restore the last dashboard after an accidental reload */
    (function () {
      var saved = null;
      try { saved = JSON.parse(localStorage.getItem("rd-last") || "null"); } catch (e) {}
      if (!saved || !saved.data) return;
      var bar = $("restoreBar");
      bar.textContent = "";
      bar.appendChild(document.createTextNode(T("restore") + " "));
      var b = document.createElement("button"); b.type = "button";
      b.textContent = T("restoreBtn") + " — " + (saved.data.title || "");
      b.addEventListener("click", function () { renderDash(saved.data, saved.src || ""); });
      bar.appendChild(b);
      var x = document.createElement("button"); x.type = "button"; x.textContent = T("dismiss");
      x.setAttribute("aria-label", "Dismiss");
      x.addEventListener("click", function () {
        bar.style.display = "none";
        try { localStorage.removeItem("rd-last"); } catch (e) {}
      });
      bar.appendChild(x);
      bar.style.display = "block";
    })();
  })();
  </script>
</body>
</html>
