<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — Namık Akman</title>
  <meta name="description" content="Get in touch with Namık Akman." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="index.html">Namık<span> Akman</span></a>
      <button class="nav-toggle" aria-label="Menu" aria-expanded="false">&#9776;</button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <h2 class="section-title">Get in touch</h2>
        <p class="section-sub">
          Interested in working together or have a question? Send a message.
        </p>
        <div class="contact-card">
          <form id="contact-form">
            <div class="form-row">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" required />
            </div>
            <div class="form-row">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required />
            </div>
            <div class="form-row">
              <label for="message">Message</label>
              <textarea id="message" name="message" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Send message</button>
            <p id="form-status" class="form-note"></p>
          </form>
          <ul class="contact-list">
            <li><strong>Email:</strong> namikakman@hotmail.com</li>
            <li><strong>Location:</strong> Add your city / country</li>
          </ul>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <span>&copy; <span data-year>2026</span> Namık Akman</span>
      <span>Built with plain HTML, CSS &amp; JavaScript</span>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
