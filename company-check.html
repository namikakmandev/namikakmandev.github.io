body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0F1117;color:#E6E8EC;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}

button:disabled{opacity:.6;cursor:default}.err{color:#E5484D;font-size:12.5px;min-height:16px;margin-top:10px}</style></head>

async function unlock(pw){var enc=new TextEncoder();

var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64d(SALT),iterations:ITER,hash:"SHA-256"},base,{name:"AES-GCM",length:256},false,["decrypt"]);

.catch(function(){e.textContent="Wrong password.";g.disabled=false;g.textContent="Unlock";p.value="";p.focus();});});
