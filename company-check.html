<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">

<style>:root{color-scheme:dark}*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0F1117;color:#E6E8EC;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
.box{width:min(360px,92vw);background:#161922;border:1px solid #262B36;border-radius:14px;padding:26px 24px;box-shadow:0 20px 60px rgba(0,0,0,.45)}
.brand{font-weight:700;font-size:18px;margin:0 0 2px}.brand span{color:#2F9BFF}
.sub{color:#8B93A1;font-size:12.5px;margin:0 0 18px}
label{display:block;font-size:12px;color:#8B93A1;margin:0 0 6px}
input{width:100%;padding:11px 12px;border-radius:9px;border:1px solid #2A3040;background:#0F1117;color:#E6E8EC;font-size:15px;outline:none}
input:focus{border-color:#2F9BFF}
button{width:100%;margin-top:12px;padding:11px 12px;border:0;border-radius:9px;background:#2F9BFF;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
button:disabled{opacity:.6;cursor:default}.err{color:#E5484D;font-size:12.5px;min-height:16px;margin-top:10px}</style></head>

<label for="pw">Password</label>
<input id="pw" type="password" autocomplete="current-password" autofocus>

async function unlock(pw){var enc=new TextEncoder();
var base=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64d(SALT),iterations:ITER,hash:"SHA-256"},base,{name:"AES-GCM",length:256},false,["decrypt"]);
var buf=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64d(IV)},key,b64d(CT));return new TextDecoder().decode(buf);}

.catch(function(){e.textContent="Wrong password.";g.disabled=false;g.textContent="Unlock";p.value="";p.focus();});});
