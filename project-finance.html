    var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64d(SALT),iterations:ITER,hash:"SHA-256"},base,{name:"AES-GCM",length:256},false,["decrypt"]);
    var buf=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64d(IV)},key,b64d(CT));
    return new TextDecoder().decode(buf);
  }
  var f=document.getElementById("gate"),p=document.getElementById("pw"),e=document.getElementById("err"),g=document.getElementById("go");
  f.addEventListener("submit",function(ev){
    ev.preventDefault(); e.textContent=""; g.disabled=true; g.textContent="Unlocking…";
    unlock(p.value).then(function(html){ document.open(); document.write(html); document.close(); })
      .catch(function(){ e.textContent="Wrong password."; g.disabled=false; g.textContent="Unlock"; p.value=""; p.focus(); });
  });
})();
