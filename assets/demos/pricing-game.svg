<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" role="img" aria-label="The Pricing Game poster">
  <rect width="640" height="360" fill="#242b3a"/>
  <rect x="0" y="0" width="640" height="360" fill="url(#g)" opacity="0.5"/>
  <defs>
    <radialGradient id="g" cx="0.8" cy="0.1" r="1">
      <stop offset="0" stop-color="#2f9bff" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#242b3a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- profit bars -->
  <g>
    <rect x="60"  y="240" width="34" height="60"  rx="4" fill="#19c37d" opacity="0.85"/>
    <rect x="104" y="220" width="34" height="80"  rx="4" fill="#19c37d" opacity="0.85"/>
    <rect x="148" y="252" width="34" height="48"  rx="4" fill="#19c37d" opacity="0.85"/>
    <rect x="192" y="300" width="34" height="26"  rx="4" fill="#e5484d" opacity="0.85" transform="translate(0,-26)"/>
    <rect x="236" y="228" width="34" height="72"  rx="4" fill="#19c37d" opacity="0.85"/>
    <rect x="280" y="196" width="34" height="104" rx="4" fill="#19c37d" opacity="0.85"/>
    <rect x="324" y="176" width="34" height="124" rx="4" fill="#19c37d" opacity="0.85"/>
  </g>
  <!-- price line -->
  <path d="M60 160 L120 150 L180 158 L240 138 L300 132 L360 118 L420 104" fill="none"
        stroke="#ff6500" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="10 8"/>
  <!-- share line -->
  <path d="M60 120 L120 128 L180 146 L240 150 L300 140 L360 126 L420 122" fill="none"
        stroke="#2f9bff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="420" cy="104" r="8" fill="#ff6500"/>
  <circle cx="420" cy="122" r="8" fill="#2f9bff"/>
  <line x1="48" y1="300" x2="592" y2="300" stroke="#4a5469" stroke-width="2"/>
  <!-- title block -->
  <text x="452" y="180" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="800" fill="#f5f7fb">The</text>
  <text x="452" y="224" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="800" fill="#f5f7fb">Pricing</text>
  <text x="452" y="268" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="800" fill="#2f9bff">Game</text>
  <text x="452" y="76" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#19c37d">12 MONTHS</text>
  <text x="452" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#c6cdda">1 DECISION / MONTH</text>
  <text x="60" y="76" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#c6cdda">Can you beat the autopilot?</text>
</svg>
