name: Update Dealer demo macro

# Independent daily refresh of dealer-demo/rates.json (FX + TCMB EVDS).
# Self-contained: does NOT depend on the ASSETIX rates job.
# The EVDS key is read from the repo secret EVDS_KEY — never stored in the repo.
on:
  schedule:
    - cron: "30 6 * * *"     # every day 06:30 UTC (09:30 İstanbul), staggered from ASSETIX
  workflow_dispatch: {}      # run manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: dealer-demo-macro
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install evds

      - name: Build dealer-demo/rates.json
        env:
          EVDS_KEY: ${{ secrets.EVDS_KEY }}
        run: python scripts/build_dealer_macro.py

      - name: Commit if changed
        run: |
          if git status --porcelain dealer-demo/rates.json | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add dealer-demo/rates.json
            git commit -m "chore: refresh dealer demo macro [skip ci]"
            git push
          else
            echo "dealer-demo/rates.json unchanged — nothing to commit."
          fi
