name: Refresh GridCast EPIAS data

# Refreshes assets/epias-live.json from the EPIAS Transparency Platform +
# Open-Meteo. Credentials are read from repo secrets EPIAS_USERNAME and
# EPIAS_PASSWORD - never stored in the repo.
on:
  schedule:
    - cron: "30 5 * * *"     # every day at 05:30 UTC (08:30 İstanbul)
  workflow_dispatch: {}       # lets you run it manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: epias-refresh
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build epias-live.json
        env:
          EPIAS_USERNAME: ${{ secrets.EPIAS_USERNAME }}
          EPIAS_PASSWORD: ${{ secrets.EPIAS_PASSWORD }}
        run: python scripts/fetch_epias.py

      - name: Commit if changed
        run: |
          if git status --porcelain assets/epias-live.json | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add assets/epias-live.json
            git commit -m "chore: refresh GridCast EPIAS data [skip ci]"
            git push
          else
            echo "epias-live.json unchanged - nothing to commit."
          fi
